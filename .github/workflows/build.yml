name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          npm install
          npm install -g cordova@11.0.0

      - name: Add Android platform
        run: |
          cordova platform add android@12.0.0

      - name: Build APK (release)
        run: |
          cordova build android --release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17 }}

      - name: Find APK
        run: |
          find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Knowledge-APK
          path: platforms/android/app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: OpenClaw 知识手册 v1.0.0
          body: |
            ## 📱 OpenClaw 知识手册 APK

            完整的 OpenClaw AI 助手框架知识总结，可离线使用。

            ### 安装方法
            1. 下载 APK 文件
            2. 在手机上启用「未知来源」应用安装
            3. 点击 APK 文件进行安装
          files: platforms/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}